<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mini Rec Room - Dorm Room</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #viseur { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; border: 1px solid black; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
        #ui-montre { position: absolute; bottom: 20px; left: 20px; background: rgba(255, 100, 0, 0.8); color: white; padding: 15px; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="viseur"></div>
    <div id="instructions">
        <h2>CLIQUE ICI POUR JOUER</h2>
        <p>Z, Q, S, D = Se déplacer<br>Souris = Regarder autour<br>Échap = Quitter</p>
    </div>
    <div id="ui-montre">⌚ Rec Room HTML v0.1 - Dorm Room</div>

    <!-- Chargement de Three.js et des contrôles FPS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // 1. Configuration de base de la scène
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a252f); // Couleur de fond sombre
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lumières
        const light = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 2. Création de la Dorm Room (Murs et Sol)
        const textureLoader = new THREE.TextureLoader();
        
        // Sol Orange "Rec Room"
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xe67e22, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Murs de la chambre (Boîte inversée ou simples murs)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x34495e, roughness: 0.9 });
        
        const wallBack = new THREE.Mesh(new THREE.BoxGeometry(30, 15, 1), wallMat);
        wallBack.position.set(0, 7.5, -15);
        scene.add(wallBack);

        const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(1, 15, 30), wallMat);
        wallLeft.position.set(-15, 7.5, 0);
        scene.add(wallLeft);

        const wallRight = new THREE.Mesh(new THREE.BoxGeometry(1, 15, 30), wallMat);
        wallRight.position.set(15, 7.5, 0);
        scene.add(wallRight);

        // 3. Objets dans la chambre (Lit et Maker Pen)
        // Un lit pixelisé basique
        const bedGeo = new THREE.BoxGeometry(4, 1.5, 6);
        const bedMat = new THREE.MeshStandardMaterial({ color: 0x2980b9 });
        const bed = new THREE.Mesh(bedGeo, bedMat);
        bed.position.set(-11, 0.75, -11);
        scene.add(bed);

        // Un "Maker Pen" géant qui flotte au milieu
        const penGeo = new THREE.CylinderGeometry(0.2, 0.2, 3, 16);
        const penMat = new THREE.MeshStandardMaterial({ color: 0x9b59b6, emissive: 0x221133 });
        const makerPen = new THREE.Mesh(penGeo, penMat);
        makerPen.position.set(0, 3, -5);
        makerPen.rotation.z = Math.PI / 4;
        scene.add(makerPen);

        // 4. Système de déplacement (FPS)
        const controls = new THREE.PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            instructions.style.display = 'none';
        });

        controls.addEventListener('unlock', () => {
            instructions.style.display = 'block';
        });

        // Placer le joueur au centre de la pièce
        camera.position.set(0, 3, 5);

        // Gestion des touches du clavier
        const keys = { z: false, s: false, q: false, d: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'z') keys.z = true;
            if(e.key.toLowerCase() === 's') keys.s = true;
            if(e.key.toLowerCase() === 'q') keys.q = true;
            if(e.key.toLowerCase() === 'd') keys.d = true;
        });

        document.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() === 'z') keys.z = false;
            if(e.key.toLowerCase() === 's') keys.s = false;
            if(e.key.toLowerCase() === 'q') keys.q = false;
            if(e.key.toLowerCase() === 'd') keys.d = false;
        });

        // 5. Boucle d'animation (Mise à jour du jeu en continu)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();

                // Ralentissement/Friction
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // Direction du regard
                direction.z = Number(keys.z) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.q);
                direction.normalize();

                // Application du mouvement
                if (keys.z || keys.s) velocity.z -= direction.z * 100.0 * delta;
                if (keys.q || keys.d) velocity.x -= direction.x * 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                // Bloquer les limites pour pas traverser les murs
                if(camera.position.x > 14) camera.position.x = 14;
                if(camera.position.x < -14) camera.position.x = -14;
                if(camera.position.z > 14) camera.position.z = 14;
                if(camera.position.z < -14) camera.position.z = -14;
            }

            // Animation esthétique : faire tourner le Maker Pen
            makerPen.rotation.y += 0.02;

            renderer.render(scene, camera);
        }

        animate();

        // Ajustement si on redimensionne la fenêtre du navigateur
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
