<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rec Room P2P - Short Code & Pseudo</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; font-family: Arial, sans-serif; user-select: none; }
        canvas { display: block; }
        #viseur { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; border: 1px solid black; }
        #instructions { position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: white; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 10; }
        
        /* WATCH UI (TAB) */
        #watch-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 320px; background: #e0e0e0; border: 10px solid #424242; border-radius: 20px; display: none; flex-direction: column; padding: 20px; z-index: 6; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .watch-input { padding: 8px; border: 2px solid #ccc; border-radius: 6px; font-size: 14px; width: 90%; }
        .watch-btn { background: #ff5722; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        
        /* MAKER PEN MENU (E) */
        #maker-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; height: 180px; background: #2196F3; border: 5px solid #1976D2; border-radius: 12px; display: none; flex-direction: column; color: white; z-index: 5; text-align: center; justify-content: center; gap: 15px; }
        .menu-btn { background: #ff9800; border: none; padding: 12px; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100px; margin: 5px; }

        /* PSEUDO 3D TAG */
        #nametag { position: absolute; color: white; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; pointer-events: none; display: none; z-index: 4; }
        #status-bar { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="viseur"></div>
    <div id="nametag">Player</div>
    
    <div id="instructions">
        <h2>CLIQUE POUR JOUER</h2>
        <p><b>Z,Q,S,D</b> | <b>E</b> = Maker Pen | <b>Tab</b> = Montre & Pseudo</p>
    </div>

    <div id="maker-menu">
        <h3>📐 OUTILS</h3>
        <div>
            <button class="menu-btn" onclick="setTool('draw')">✏️ CRÉER</button>
            <button class="menu-btn" onclick="setTool('delete')">❌ SUPPR</button>
        </div>
    </div>

    <div id="watch-ui">
        <h2 style="margin: 0; color: #ff5722;">⌚ REC WATCH</h2>
        <label>Mon Pseudo :</label>
        <input type="text" id="username-input" class="watch-input" value="RecPlayer" maxlength="12">
        
        <button class="watch-btn" style="background:#00bcd4;" id="btn-init" onclick="initPeer()">1. Générer ma Chambre</button>
        <b id="my-code-txt" style="font-size: 18px;">Code Salon : Aucun</b>
        
        <input type="text" id="peer-id-input" class="watch-input" placeholder="Entrer le code à 4 chiffres de l'ami...">
        <button class="watch-btn" style="background:#4CAF50;" onclick="connectToPeer()">2. Rejoindre l'ami</button>
    </div>
    
    <div id="status-bar">🌐 Solo | Appuie sur TAB</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        // --- MOTEUR 3D SIMPLE ---
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a252f);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const targets = [], cubes = [];
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshStandardMaterial({color: 0xe67e22}));
        floor.rotation.x = -Math.PI/2; scene.add(floor); targets.push(floor);

        // Stylo attaché à la caméra
        const makerPen = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5), new THREE.MeshStandardMaterial({color: 0xdddddd}));
        makerPen.position.set(0.3, -0.2, -0.5); makerPen.rotation.x = Math.PI/2; camera.add(makerPen); scene.add(camera);

        // --- CONTROLES FPS ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const UI = { inst: document.getElementById('instructions'), pen: document.getElementById('maker-menu'), watch: document.getElementById('watch-ui'), tag: document.getElementById('nametag'), status: document.getElementById('status-bar') };
        
        UI.inst.addEventListener('click', () => { if(UI.pen.style.display !== 'flex' && UI.watch.style.display !== 'flex') controls.lock(); });
        controls.addEventListener('lock', () => UI.inst.style.display = 'none');
        controls.addEventListener('unlock', () => { if(UI.pen.style.display !== 'flex' && UI.watch.style.display !== 'flex') UI.inst.style.display = 'flex'; });

        camera.position.set(0, 3, 5);
        const keys = { z:0, s:0, q:0, d:0 }; let currentTool = 'draw';
        document.addEventListener('keydown', (e) => {
            if(e.key==='z'||e.code==='KeyW') keys.z = 1; if(e.key==='s') keys.s = 1; if(e.key==='q'||e.code==='KeyA') keys.q = 1; if(e.key==='d') keys.d = 1;
            if(e.key==='e' && UI.watch.style.display !== 'flex') { if(UI.pen.style.display === 'flex') { UI.pen.style.display='none'; controls.lock(); } else { UI.pen.style.display='flex'; controls.unlock(); } }
            if(e.code==='Tab') { e.preventDefault(); if(UI.pen.style.display === 'flex') return; if(UI.watch.style.display === 'flex') { UI.watch.style.display='none'; controls.lock(); } else { UI.watch.style.display='flex'; controls.unlock(); } }
        });
        document.addEventListener('keyup', (e) => { if(e.key==='z'||e.code==='KeyW') keys.z = 0; if(e.key==='s') keys.s = 0; if(e.key==='q'||e.code==='KeyA') keys.q = 0; if(e.key==='d') keys.d = 0; });
        window.setTool = (t) => { currentTool = t; UI.pen.style.display = 'none'; controls.lock(); };

        // --- MULTIJOUEUR P2P SHORT CODE & PSEUDO ---
        let peer = null, conn = null, remotePlayer = null, remoteName = "Ami";
        let myName = "RecPlayer";

        window.initPeer = () => {
            myName = document.getElementById('username-input').value || "Player";
            document.getElementById('btn-init').innerText = "Création...";
            
            // On force la création d'un code court à 4 chiffres (ex: "recroom-4812") pour que ce soit facile à taper
            const shortRoomCode = Math.floor(1000 + Math.random() * 9000).toString();
            
            peer = new Peer('recroom-' + shortRoomCode);
            
            peer.on('open', (id) => { 
                const cleanCode = id.replace('recroom-', '');
                document.getElementById('my-code-txt').innerText = "Code Salon : " + cleanCode; 
                UI.status.innerText = "🌐 Salon [" + cleanCode + "] - En attente..."; 
                document.getElementById('btn-init').style.display = 'none'; 
            });
            peer.on('connection', (c) => { conn = c; setupMulti(); });
            peer.on('error', (err) => { alert("Erreur réseau ou code déjà pris, réessaye !"); document.getElementById('btn-init').innerText = "1. Générer ma Chambre"; });
        };

        window.connectToPeer = () => {
            myName = document.getElementById('username-input').value || "Player";
            const targetCode = document.getElementById('peer-id-input').value.trim();
            if(!targetCode) return alert("Rentre le code à 4 chiffres de ton pote !");
            
            if(!peer) peer = new Peer();
            
            peer.on('open', () => { 
                conn = peer.connect('recroom-' + targetCode); 
                setupMulti(); 
            });
        };

        function setupMulti() {
            UI.status.innerText = "🌐 CONNECTÉ !"; UI.watch.style.display = 'none'; controls.lock();
            remotePlayer = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2), new THREE.MeshStandardMaterial({color: 0xffffff})); scene.add(remotePlayer);
            
            setTimeout(() => send({type:'handshake', name: myName}), 500);

            conn.on('data', (d) => {
                if(d.type === 'handshake') { remoteName = d.name; }
                if(d.type === 'move') { remotePlayer.position.set(d.x, d.y-1, d.z); updatePseudoTag(); }
                if(d.type === 'build') buildCube(d.x, d.y, d.z);
                if(d.type === 'del') deleteCube(d.x, d.y, d.z);
            });
        }
        function send(obj) { if(conn && conn.open) conn.send(obj); }

        // --- AFFICHAGE PSEUDO 2D ---
        function updatePseudoTag() {
            if (!remotePlayer) return;
            const wp = new THREE.Vector3();
            remotePlayer.getWorldPosition(wp);
            wp.y += 1.3;
            wp.project(camera);
            if(wp.z > 1) { UI.tag.style.display = 'none'; return; }
            const x = (wp.x * .5 + .5) * window.innerWidth;
            const y = (-(wp.y * .5) + .5) * window.innerHeight;
            UI.tag.style.left = `${x}px`; UI.tag.style.top = `${y}px`;
            UI.tag.innerText = remoteName;
            UI.tag.style.display = 'block';
        }

        // --- SYSTEME DE CONSTRUCTION ---
        const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
        document.addEventListener('pointerdown', () => {
            if(!controls.isLocked) return;
            raycaster.setFromCamera(mouse, camera);
            if(currentTool === 'draw') {
                const hits = raycaster.intersectObjects(targets);
                if(hits.length > 0) {
                    const p = hits[0].point.clone().add(hits[0].face.normal.clone().multiplyScalar(0.5));
                    const x = Math.round(p.x), y = Math.round(p.y*2)/2, z = Math.round(p.z);
                    buildCube(x,y,z); send({type:'build', x, y, z});
                }
            } else if(currentTool === 'delete') {
                const hits = raycaster.intersectObjects(cubes);
                if(hits.length > 0) {
                    const c = hits[0].object;
                    deleteCube(c.position.x, c.position.y, c.position.z);
                    send({type:'del', x:c.position.x, y:c.position.y, z:c.position.z});
                }
            }
        });

        function buildCube(x,y,z) {
            const cube = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xffa500}));
            cube.position.set(x,y,z); scene.add(cube); targets.push(cube); cubes.push(cube);
        }
        function deleteCube(x,y,z) {
            const c = cubes.find(obj => obj.position.x===x && obj.position.y===y && obj.position.z===z);
            if(c) { scene.remove(c); targets.splice(targets.indexOf(c),1); cubes.splice(cubes.indexOf(c),1); }
        }

        // --- BOUCLE DE JEU ---
        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                if(keys.z) controls.moveForward(0.15); if(keys.s) controls.moveForward(-0.15);
                if(keys.q) controls.moveRight(-0.15); if(keys.d) controls.moveRight(0.15);
                send({type:'move', x:camera.position.x, y:camera.position.y, z:camera.position.z});
            }
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
