<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rec Room HTML - Maker Pen Advanced Tools</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; font-family: Arial, sans-serif; user-select: none; }
        canvas { display: block; }
        #viseur { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; border: 1px solid black; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.85); padding: 25px; border-radius: 10px; text-align: center; cursor: pointer; z-index: 10; }
        #info-interaction { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: #ffeb3b; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 3px black; display: none; pointer-events: none; }
        
        /* Menu Maker Pen */
        #maker-menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 500px; height: 320px; background: #2196F3; border: 6px solid #1976D2; 
            border-radius: 15px; display: none; flex-direction: column; color: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 5; font-family: 'Arial Black', sans-serif;
        }
        .menu-header { background: #1565C0; padding: 10px; text-align: center; font-size: 18px; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .menu-content { display: flex; flex-wrap: wrap; padding: 20px; justify-content: space-around; gap: 10px; }
        .menu-btn { background: #ff9800; border: none; padding: 15px 20px; color: white; font-size: 14px; border-radius: 8px; cursor: pointer; transition: 0.1s; box-shadow: 0 4px #e65100; width: 140px; }
        .menu-btn:active { transform: translateY(4px); box-shadow: none; }
        .menu-btn.active { background: #4CAF50; box-shadow: 0 4px #388E3C; }
        
        #ui-montre { position: absolute; bottom: 20px; left: 20px; background: rgba(255, 87, 34, 0.9); color: white; padding: 15px; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="viseur"></div>
    <div id="info-interaction">Clique pour ramasser le Maker Pen !</div>
    
    <div id="instructions">
        <h2>CLIQUE ICI POUR JOUER</h2>
        <p><b>Z, Q, S, D</b> = Se déplacer | <b>Espace</b> = Sauter<br><b>E</b> = Menu du Maker Pen<br><b>Remodeler</b> = Rester appuyé sur le bloc + Molette souris</p>
    </div>

    <div id="maker-menu">
        <div class="menu-header">📐 PALETTE DU MAKER PEN</div>
        <div class="menu-content">
            <button class="menu-btn" id="btn-draw" onclick="setTool('draw')">✏️ DESSINER</button>
            <button class="menu-btn" id="btn-reshape" onclick="setTool('reshape')">📐 REMODELER</button>
            <button class="menu-btn" id="btn-delete" onclick="setTool('delete')">❌ SUPPRIMER</button>
        </div>
        <div style="text-align:center; padding-top:20px; font-size:14px;" id="current-tool-txt">Outil actuel : Aucun</div>
        <div style="text-align:center; padding-top:10px; font-size:12px;">Appuie sur 'E' pour fermer</div>
    </div>
    
    <div id="ui-montre">⌚ Rec Room v0.5 | Outil Remodeler Intégré</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- INITIALISATION SCÈNE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a252f);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const targetsClickables = []; 
        const cubesDessines = [];

        // Sol
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0xe67e22, roughness: 0.8 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        targetsClickables.push(floor);

        // Murs
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.9 });
        const createWall = (w, h, d, x, y, z) => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            wall.position.set(x, y, z);
            scene.add(wall);
            targetsClickables.push(wall);
        };
        createWall(30, 15, 1, 0, 7.5, -15);
        createWall(1, 15, 30, -15, 7.5, 0);
        createWall(1, 15, 30, 15, 7.5, 0);

        // --- MAKER PEN ---
        const makerPen = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.8, 16), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
        body.rotation.x = Math.PI / 2; makerPen.add(body);
        const tip = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3, 16), new THREE.MeshStandardMaterial({ color: 0xe67e22 }));
        tip.position.z = -0.55; tip.rotation.x = -Math.PI / 2; makerPen.add(tip);
        const screen = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.05), new THREE.MeshStandardMaterial({ color: 0x34495e }));
        screen.position.set(0, 0.08, 0.38); makerPen.add(screen);

        makerPen.position.set(0, 2.2, -3);
        scene.add(makerPen);

        // --- INTERFACES ET LOGIQUE ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        const infoInteraction = document.getElementById('info-interaction');
        const makerMenu = document.getElementById('maker-menu');

        instructions.addEventListener('click', () => { if(makerMenu.style.display !== 'flex') controls.lock(); });
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => { if(makerMenu.style.display !== 'flex') instructions.style.display = 'block'; });

        camera.position.set(0, 3, 5);

        const keys = { z: false, s: false, q: false, d: false, space: false };
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let canJump = false;
        let hasMakerPen = false;
        let menuOpen = false;
        let currentTool = 'none';

        // Variables de remodelage
        let blockSelectionne = null;

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if(key === 'z' || e.code === 'KeyW') keys.z = true;
            if(key === 's') keys.s = true;
            if(key === 'q' || e.code === 'KeyA') keys.q = true;
            if(key === 'd') keys.d = true;
            if(e.code === 'Space') keys.space = true;
            
            if(key === 'e' && hasMakerPen) {
                menuOpen = !menuOpen;
                if(menuOpen) { controls.unlock(); makerMenu.style.display = 'flex'; } 
                else { makerMenu.style.display = 'none'; controls.lock(); }
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(key === 'z' || e.code === 'KeyW') keys.z = false;
            if(key === 's') keys.s = false;
            if(key === 'q' || e.code === 'KeyA') keys.q = false;
            if(key === 'd') keys.d = false;
            if(e.code === 'Space') keys.space = false;
        });

        window.setTool = function(tool) {
            currentTool = tool;
            document.getElementById('current-tool-txt').innerText = "Outil actuel : " + tool.toUpperCase();
            
            document.getElementById('btn-draw').classList.remove('active');
            document.getElementById('btn-reshape').classList.remove('active');
            document.getElementById('btn-delete').classList.remove('active');
            if(tool === 'draw') document.getElementById('btn-draw').classList.add('active');
            if(tool === 'reshape') document.getElementById('btn-reshape').classList.add('active');
            if(tool === 'delete') document.getElementById('btn-delete').classList.add('active');

            menuOpen = false;
            makerMenu.style.display = 'none';
            controls.lock();
        }

        // --- REYCASTER ET CLICS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0);

        // Appui clic souris
        document.addEventListener('pointerdown', (e) => {
            if (!controls.isLocked) return;

            // Ramasser le stylo
            if (!hasMakerPen) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(makerPen.children);
                if (intersects.length > 0) {
                    hasMakerPen = true;
                    infoInteraction.style.display = 'none';
                    scene.remove(makerPen);
                    camera.add(makerPen);
                    makerPen.position.set(0.35, -0.3, -0.6);
                    makerPen.rotation.set(0.2, Math.PI + 0.3, 0); 
                    setTool('draw');
                }
                return;
            }

            raycaster.setFromCamera(mouse, camera);

            // Mode DESSINER
            if (currentTool === 'draw') {
                const intersects = raycaster.intersectObjects(targetsClickables);
                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
                    const cubeMat = new THREE.MeshStandardMaterial({ color: 0xffa500, roughness: 0.5 });
                    const newCube = new THREE.Mesh(cubeGeo, cubeMat);

                    const positionPositionnee = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(0.5));
                    newCube.position.set(Math.round(positionPositionnee.x), Math.round(positionPositionnee.y * 2) / 2, Math.round(positionPositionnee.z));

                    scene.add(newCube);
                    targetsClickables.push(newCube);
                    cubesDessines.push(newCube);
                }
            } 
            // Mode REMODELER (Sélection du bloc)
            else if (currentTool === 'reshape') {
                const intersects = raycaster.intersectObjects(cubesDessines);
                if (intersects.length > 0) {
                    blockSelectionne = intersects[0].object;
                    // Change de couleur temporairement pour indiquer la sélection (Vert)
                    blockSelectionne.material.color.setHex(0x4CAF50);
                }
            }
            // Mode SUPPRIMER
            else if (currentTool === 'delete') {
                const intersects = raycaster.intersectObjects(cubesDessines);
                if (intersects.length > 0) {
                    const hitCube = intersects[0].object;
                    scene.remove(hitCube);
                    const idx1 = targetsClickables.indexOf(hitCube); if(idx1 > -1) targetsClickables.splice(idx1, 1);
                    const idx2 = cubesDessines.indexOf(hitCube); if(idx2 > -1) cubesDessines.splice(idx2, 1);
                }
            }
        });

        // Relâchement du clic souris
        document.addEventListener('pointerup', () => {
            // Si on remodelait un bloc, on lui remet sa couleur orange d'origine
            if (blockSelectionne) {
                blockSelectionne.material.color.setHex(0xffa500);
                blockSelectionne = null;
            }
        });

        // Événement Molette de souris pour redimensionner le bloc sélectionné
        document.addEventListener('wheel', (e) => {
            if (controls.isLocked && currentTool === 'reshape' && blockSelectionne) {
                // Déterminer la direction du zoom/scroll
                const changementTaille = e.deltaY < 0 ? 0.1 : -0.1;
                
                // Appliquer le redimensionnement de manière uniforme sur les 3 axes
                blockSelectionne.scale.x += changementTaille;
                blockSelectionne.scale.y += changementTaille;
                blockSelectionne.scale.z += changementTaille;

                // Bloquer une taille minimale pour éviter que le bloc ne disparaisse ou s'inverse
                if (blockSelectionne.scale.x < 0.2) {
                    blockSelectionne.scale.set(0.2, 0.2, 0.2);
                }
            }
        });

        // --- BOUCLE DE MISE À JOUR ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 3.0 * delta;

                direction.z = Number(keys.z) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.q);
                direction.normalize();

                if (keys.z || keys.s) velocity.z -= direction.z * 80.0 * delta;
                if (keys.q || keys.d) velocity.x -= direction.x * 80.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                camera.position.y += velocity.y * delta;
                if (camera.position.y < 3.0) {
                    velocity.y = 0;
                    camera.position.y = 3.0;
                    canJump = true;
                }
                if (keys.space && canJump) {
                    velocity.y += 11.0;
                    canJump = false;
                }

                if(camera.position.x > 14) camera.position.x = 14;
                if(camera.position.x < -14) camera.position.x = -14;
                if(camera.position.z > 14) camera.position.z = 14;
                if(camera.position.z < -14) camera.position.z = -14;

                if (!hasMakerPen) {
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects(makerPen.children);
                    if (intersects.length > 0 && camera.position.distanceTo(makerPen.position) < 7) {
                        infoInteraction.style.display = 'block';
                    } else {
                        infoInteraction.style.display = 'none';
                    }
                }
            }

            if (!hasMakerPen) {
                makerPen.rotation.y += 0.015;
                makerPen.position.y = 2.2 + Math.sin(clock.getElapsedTime() * 2.5) * 0.08;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
